<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻轉魔羊 - 自動播放動畫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Noto Sans TC', sans-serif;
  background: #000;
}
#root { width: 100%; height: 100%; position: relative; }
canvas {
  display: block; position: absolute; top: 0; left: 0;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
#crt-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 999;
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, transparent 1px, transparent 2px, rgba(0,0,0,0.15) 3px),
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
}
.overlay-text {
  position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
  width: 85%; max-width: 800px;
  background: rgba(10,5,20,0.95); backdrop-filter: blur(10px);
  border: 3px solid #5cf6ff; border-radius: 16px;
  padding: 2rem; box-shadow: 0 0 40px rgba(92,246,255,0.5);
  z-index: 100; animation: fadeIn 0.5s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.speaker {
  font-size: 1.1rem; font-weight: 700; color: #5cf6ff;
  margin-bottom: 0.8rem; text-transform: uppercase;
}
.speaker.magic { color: #ff7ad9; }
.speaker.both { color: #9cff5c; }
.text {
  font-size: 1.3rem; line-height: 1.6; color: #fff;
}
.title-overlay {
  position: absolute; inset: 0; z-index: 50;
  background: radial-gradient(ellipse at center, rgba(26,10,58,0.9) 0%, rgba(0,0,0,0.8) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: fadeIn 1s;
}
.title-logo {
  font-family: 'Press Start 2P', monospace; font-size: 3rem; color: #5cf6ff;
  text-shadow: 0 0 20px #5cf6ff, 0 0 40px #b59dff, 4px 4px 0 #000;
  margin-bottom: 1rem; animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.title-sub {
  font-size: 1.2rem; color: #b59dff; margin-bottom: 2rem;
}
.play-btn {
  padding: 1.2rem 3rem; font-size: 1.4rem; font-weight: 700;
  background: linear-gradient(135deg, #5cf6ff 0%, #b59dff 100%);
  border: 3px solid #fff; border-radius: 8px; cursor: pointer;
  color: #000; font-family: 'Press Start 2P', monospace;
  box-shadow: 0 0 30px rgba(92,246,255,0.6);
  transition: all 0.3s;
}
.play-btn:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 8px 40px rgba(92,246,255,0.8);
}
.level-title {
  position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace; font-size: 1.5rem;
  color: #5cf6ff; text-shadow: 0 0 20px #5cf6ff;
  background: rgba(10,5,20,0.9); padding: 1rem 2rem;
  border: 2px solid #5cf6ff; border-radius: 12px;
  z-index: 80; animation: fadeIn 0.5s;
}
.ending-overlay {
  position: absolute; inset: 0; z-index: 90;
  background: radial-gradient(ellipse at center, rgba(26,10,58,0.95) 0%, rgba(0,0,0,0.9) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: fadeIn 1s;
}
.ending-title {
  font-family: 'Press Start 2P', monospace; font-size: 3rem;
  background: linear-gradient(135deg, #5cf6ff 0%, #ff7ad9 50%, #9cff5c 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 1rem;
  animation: rainbow 3s infinite;
}
@keyframes rainbow {
  0%, 100% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(30deg); }
}
.ending-sub {
  font-size: 1.5rem; color: #b59dff; margin-bottom: 2rem;
}
.replay-btn {
  padding: 1rem 3rem; font-size: 1.2rem; font-weight: 700;
  background: linear-gradient(135deg, #9cff5c 0%, #ffe14d 100%);
  border: 3px solid #fff; border-radius: 8px; cursor: pointer;
  color: #000; transition: all 0.3s;
}
.replay-btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(156,255,92,0.6);
}
/* Mirror Wipe Transition */
.mirror-wipe {
  position: absolute; inset: 0; z-index: 90;
  background: radial-gradient(circle at center, transparent 0%, var(--wipe-color) 100%);
  animation: wipeIn 1.5s ease-in-out;
  pointer-events: none;
}
@keyframes wipeIn {
  0% { opacity: 0; transform: scale(0); border-radius: 50%; }
  50% { opacity: 1; transform: scale(2); border-radius: 50%; }
  100% { opacity: 0; transform: scale(4); border-radius: 0%; }
}
</style>
</head>
<body>
<div id="root">
  <canvas id="canvas"></canvas>
  <div id="crt-overlay"></div>
  <div id="ui"></div>
</div>

<script type="module">
const LEVELS = [
  {
    id: 1, chapter: '第一章 · 啟航週', sub: '認識 · 探索 · 啟程',
    labels: ['破冰活動', '認識同學', '校園導覽', '社團博覽', '迎新晚會', '宿舍生活'],
    images: [
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/破冰活動.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/認識同學.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/校園導覽.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/社團博覽.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/迎新晚會.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/宿舍生活.jpg',
    ],
    accent: '#ffe14d', floor: '#2a2a1a', wall: '#1a1a0a',
  },
  {
    id: 2, chapter: '第二章 · 校園 GOOGLE', sub: '搜尋 · 學習 · 探索',
    labels: ['登入校園', '雲端硬碟', '電子郵件', '線上會議', '共筆協作', '查詢成績'],
    images: [
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/登入校園.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/雲端硬碟.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/電子郵件.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/線上會議.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/共筆協作.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/查詢成績.jpg',
    ],
    accent: '#5cf6ff', floor: '#1a1a4a', wall: '#0a0a2a',
  },
  {
    id: 3, chapter: '第三章 · 健康存摺 ABC', sub: '運動 · 健康 · 平衡',
    labels: ['健康檢查', '運動紀錄', '飲食均衡', '心理諮商', '社團活動', '伸展放鬆'],
    images: [
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/健康檢查.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/運動紀錄.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/飲食均衡.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/心理諮商.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/社團活動.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/伸展放鬆.jpg',
    ],
    accent: '#9cff5c', floor: '#1a2a1a', wall: '#0a1a0a',
  },
  {
    id: 4, chapter: '第四章 · 成為學習的主人', sub: '自主 · 探索 · 創造',
    labels: ['自主提案', '專題發表', '跨域選修', '證照挑戰', '黑客松', '實習成果'],
    images: [
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/自主提案.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/專題發表.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/跨域選修.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/證照挑戰.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/黑客松.jpg',
      'https://raw.githubusercontent.com/ntyr10086/Leading-Sheep-Final-Animation/main/images/實習成果.jpg',
    ],
    accent: '#b59dff', floor: '#1a1a2a', wall: '#0a0a1a',
  },
];

const SCRIPT = [
  { stage: 'question', speaker: '小 羊', text: '魔鏡啊魔鏡，誰是這世界上最棒的領頭羊？', cls: 'sheep', duration: 3000 },
  { stage: 'intro', speaker: '魔 羊', text: '哼哼…想成為領頭羊嗎？那就跟我進入記憶宇宙，翻轉四個世界的規則吧！', cls: 'magic', duration: 4000 },
  { stage: 'intro', speaker: '魔 羊', text: '收集每個世界的記憶碎片，答對咒語，才能揭開真正的答案…', cls: 'magic', duration: 4000 },
  { stage: 'level', level: 0 },
  { stage: 'level', level: 1 },
  { stage: 'level', level: 2 },
  { stage: 'level', level: 3 },
  // ending 对话移到 showEnding 函数中处理
];

class AutoPlayGame {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.width = 1280;
    this.height = 720;
    canvas.width = this.width;
    canvas.height = this.height;
    this.ctx.imageSmoothingEnabled = false;
    
    this.mode = 'title';
    this.level = 0;
    this.cameraX = 0;
    this.transitioning = false;  // 传送中标志
    this.sheep = { x: 640, y: 520, vx: 0, facing: 1 };
    this.exhibits = [];
    this.particles = [];
    this.collected = 0;
    
    this.scriptIndex = 0;
    this.scriptTimer = 0;
    this.autoMoving = false;
    
    this.lastTime = performance.now();
    this.animate();
  }
  
  startAuto() {
    // 显示开场传送特效
    const ui = document.getElementById('ui');
    const openingWipe = document.createElement('div');
    openingWipe.className = 'mirror-wipe';
    openingWipe.style.setProperty('--wipe-color', '#5cf6ff');
    ui.appendChild(openingWipe);
    
    // 1.5秒后移除特效并开始播放
    setTimeout(() => {
      openingWipe.remove();
      this.mode = 'playing';
      this.scriptIndex = 0;
      this.executeScript();
    }, 1500);
  }
  
  executeScript() {
    console.log(`executeScript called, scriptIndex: ${this.scriptIndex}, SCRIPT.length: ${SCRIPT.length}`);
    
    if (this.scriptIndex >= SCRIPT.length) {
      console.log('✅ 触发结尾场景！');
      this.showEnding();
      return;
    }
    
    const script = SCRIPT[this.scriptIndex];
    console.log(`执行脚本: stage=${script.stage}, level=${script.level || 'N/A'}`);
    
    if (script.stage === 'question') {
      // 問題場景：小羊站在魔鏡前問問題
      this.mode = 'title';
      this.showDialog(script.speaker, script.text, script.cls);
      setTimeout(() => {
        this.hideDialog();
        this.scriptIndex++;
        this.executeScript();
      }, script.duration);
    } else if (script.stage === 'intro') {
      this.showDialog(script.speaker, script.text, script.cls);
      setTimeout(() => {
        this.hideDialog();
        this.scriptIndex++;
        this.executeScript();
      }, script.duration);
    } else if (script.stage === 'level') {
      this.startLevel(script.level);
      // 不使用 setTimeout，等待小羊到达终点触发魔镜传送后自动继续
    }
  }
  
  startLevel(levelIdx) {
    this.mode = 'hall';
    this.level = levelIdx;
    this.collected = 0;
    this.cameraX = 0;
    this.transitioning = false;  // 重置传送标志
    this.sheep.x = 200;
    this.sheep.y = 520;
    this.sheep.vx = 300;  // 提高速度让小羊能在12秒内到达魔镜（3800位置）
    this.autoMoving = true;
    
    this.exhibits = [];
    const lv = LEVELS[levelIdx];
    for (let i = 0; i < 6; i++) {
      const exhibit = {
        x: 400 + i * 550,
        y: 350,
        flipped: false,
        label: lv.labels[i],
        image: null,
        imageLoaded: false,
        color: lv.accent,
      };
      
      // 只在有图片URL时才尝试加载
      if (lv.images && lv.images[i] && !lv.images[i].includes('你的域名')) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = () => {
          exhibit.imageLoaded = true;
        };
        
        img.onerror = () => {
          console.warn(`图片加载失败: ${lv.labels[i]}`);
          exhibit.imageLoaded = false;
        };
        
        img.src = lv.images[i];
        exhibit.image = img;
      }
      
      this.exhibits.push(exhibit);
    }
    
    this.showLevelTitle(lv.chapter);
  }
  
  update(dt) {
    if (this.mode === 'hall' && this.autoMoving) {
      this.sheep.x += this.sheep.vx * dt;
      
      const targetCamX = this.sheep.x - this.width / 3;
      this.cameraX += (targetCamX - this.cameraX) * 0.1;
      this.cameraX = Math.max(0, Math.min(this.cameraX, 4000 - this.width));  // 调整相机范围
      
      for (const ex of this.exhibits) {
        if (ex.flipped) continue;
        const dx = Math.abs(this.sheep.x - ex.x);
        if (dx < 280) {  // 扩大碰撞范围配合 480x320 展品
          ex.flipped = true;
          this.collected++;
          this.emitBurst(ex.x, ex.y - 40, ex.color);
        }
      }
      
      if (this.sheep.x > 3800) {  // 调整终点位置
        this.autoMoving = false;
        // 触发魔镜传送特效
        if (!this.transitioning) {
          this.transitioning = true;
          this.triggerMirrorWipe();
        }
      }
    }
    
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        this.particles.splice(i, 1);
        continue;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      if (p.rotation !== undefined) p.rotation += p.spin * dt;
    }
  }
  
  emitBurst(x, y, color) {
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 250;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 120,
        life: 1.0 + Math.random() * 0.6,
        color,
        type: Math.random() > 0.5 ? 'star' : 'heart',
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 4,
      });
    }
  }
  
  render() {
    const c = this.ctx;
    c.fillStyle = '#0a0514';
    c.fillRect(0, 0, this.width, this.height);
    
    if (this.mode === 'title' || this.mode === 'playing') {
      c.fillStyle = '#5cf6ff';
      c.globalAlpha = 0.3;
      for (let i = 0; i < 50; i++) {
        const sx = (i * 193) % this.width;
        const sy = (i * 127) % this.height;
        this.drawStar(c, sx, sy);
      }
      c.globalAlpha = 1;
      
      const floorGrad = c.createLinearGradient(0, 520, 0, 720);
      floorGrad.addColorStop(0, '#1a1a4a');
      floorGrad.addColorStop(1, '#0a0a2a');
      c.fillStyle = floorGrad;
      c.fillRect(0, 520, this.width, 200);
      
      c.fillStyle = '#5cf6ff';
      c.globalAlpha = 0.4;
      c.fillRect(0, 520, this.width, 3);
      c.globalAlpha = 1;
      
      this.drawMirror(c, this.width / 2, 300, '#5cf6ff');
      this.drawSheep(c, this.width / 2, 520, 1);
    }
    
    if (this.mode === 'hall') {
      c.save();
      c.translate(-this.cameraX, 0);
      
      const lv = LEVELS[this.level];
      
      const skyGrad = c.createLinearGradient(0, 0, 0, 520);
      skyGrad.addColorStop(0, lv.wall);
      skyGrad.addColorStop(1, lv.floor);
      c.fillStyle = skyGrad;
      c.fillRect(0, 0, 4500, 520);  // 扩展场景宽度
      
      c.fillStyle = lv.accent;
      c.globalAlpha = 0.2;
      for (let i = 0; i < 30; i++) {
        const sx = (i * 237) % 4500;  // 扩展星空范围
        const sy = (i * 153) % 480;
        this.drawStar(c, sx, sy);
      }
      c.globalAlpha = 1;
      
      c.fillStyle = lv.floor;
      c.fillRect(0, 520, 4500, 200);  // 扩展地板
      
      c.strokeStyle = lv.accent;
      c.globalAlpha = 0.4;
      c.lineWidth = 3;
      for (let x = 0; x < 4500; x += 64) {  // 扩展地板砖
        for (let y = 520; y < 720; y += 64) {
          c.strokeRect(x + 2, y + 2, 60, 60);
        }
      }
      c.globalAlpha = 1;
      
      for (const ex of this.exhibits) {
        this.drawExhibit(c, ex);
      }
      
      if (this.collected >= 6) {  // 改成 6 个展品
        this.drawMirror(c, 3800, 350, lv.accent);  // 调整到更远位置
      }
      
      this.drawSheep(c, this.sheep.x, this.sheep.y, this.sheep.facing);
      
      for (const p of this.particles) {
        this.drawParticle(c, p);
      }
      
      c.restore();
    }
  }
  
  drawStar(c, x, y) {
    c.fillRect(x - 1, y - 3, 2, 2);
    c.fillRect(x - 1, y + 1, 2, 2);
    c.fillRect(x - 3, y - 1, 2, 2);
    c.fillRect(x + 1, y - 1, 2, 2);
    c.fillRect(x - 1, y - 1, 2, 2);
  }
  
  drawMirror(c, x, y, color) {
    const w = 120, h = 160;
    const time = performance.now() / 1000;
    
    c.fillStyle = color;
    c.globalAlpha = 0.8;
    c.fillRect(x - w/2 - 16, y - h/2 - 16, w + 32, h + 32);
    c.globalAlpha = 1;
    c.fillStyle = color;
    c.fillRect(x - w/2 - 10, y - h/2 - 10, w + 20, h + 20);
    
    const grad = c.createRadialGradient(x, y - 10, 10, x, y, w/2);
    grad.addColorStop(0, 'rgba(150,150,255,0.6)');
    grad.addColorStop(0.6, 'rgba(58,58,120,0.6)');
    grad.addColorStop(1, 'rgba(10,10,30,0.9)');
    c.fillStyle = grad;
    c.fillRect(x - w/2, y - h/2, w, h);
    
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + time * 0.3;
      const dist = 35 + Math.sin(time * 2 + i) * 8;
      const sx = x + Math.cos(angle) * dist;
      const sy = y + Math.sin(angle) * dist * 1.2;
      c.fillStyle = '#fff';
      c.globalAlpha = 0.8;
      this.drawStar(c, sx, sy);
    }
    c.globalAlpha = 1;
    
    const heartY = y - h/2 - 35 + Math.sin(time * 2) * 3;
    c.fillStyle = '#ff7ad9';
    c.fillRect(x - 6, heartY, 4, 4);
    c.fillRect(x + 2, heartY, 4, 4);
    c.fillRect(x - 8, heartY + 4, 16, 4);
    c.fillRect(x - 6, heartY + 8, 12, 4);
    c.fillRect(x - 4, heartY + 12, 8, 4);
    c.fillRect(x - 2, heartY + 16, 4, 4);
  }
  
  drawSheep(c, x, y, facing) {
    const PX = 6;
    c.save();
    c.translate(x, y);
    if (facing === -1) c.scale(-1, 1);
    
    c.fillStyle = '#fff5e8';
    const body = [
      [-5, 2, 2, 2], [-3, 2, 6, 2], [3, 2, 2, 2],
      [-6, 0, 2, 2], [-4, 0, 8, 2], [4, 0, 2, 2],
      [-6, -2, 2, 2], [-4, -2, 8, 2], [4, -2, 2, 2],
      [-5, -4, 2, 2], [-3, -4, 6, 2], [3, -4, 2, 2],
      [-3, -6, 6, 2],
    ];
    for (const [bx, by, bw, bh] of body) {
      c.fillRect(bx * PX, by * PX, bw * PX, bh * PX);
    }
    
    c.fillStyle = '#f5d5b5';
    c.fillRect(2 * PX, -3 * PX, 4 * PX, 4 * PX);
    c.fillRect(6 * PX, -2 * PX, 2 * PX, 2 * PX);
    
    c.fillStyle = '#1a1a2a';
    c.fillRect(3 * PX, -2 * PX, 2 * PX, 2 * PX);
    c.fillRect(5.5 * PX, -2 * PX, 2 * PX, 2 * PX);
    
    c.fillStyle = '#ffffff';
    c.fillRect(3.5 * PX, -1.5 * PX, 1 * PX, 1 * PX);
    c.fillRect(6 * PX, -1.5 * PX, 1 * PX, 1 * PX);
    
    c.fillStyle = '#ff9db5';
    c.fillRect(4.5 * PX, 0.5 * PX, 2 * PX, 1 * PX);
    
    c.fillStyle = 'rgba(255,157,181,0.6)';
    c.fillRect(1.5 * PX, -0.5 * PX, 2 * PX, 2 * PX);
    c.fillRect(7 * PX, -0.5 * PX, 2 * PX, 2 * PX);
    
    c.fillStyle = '#5cf6ff';
    c.fillRect(4 * PX, -7 * PX, 2 * PX, 2 * PX);
    c.fillRect(3 * PX, -6.5 * PX, 1 * PX, 1 * PX);
    c.fillRect(6 * PX, -6.5 * PX, 1 * PX, 1 * PX);
    
    c.restore();
  }
  
  drawExhibit(c, ex) {
    const w = 480;
    const h = 320;
    
    if (ex.flipped) {
      // 翻转后：优先显示图片，失败则显示文字
      c.fillStyle = ex.color;
      c.globalAlpha = 0.3;
      c.fillRect(ex.x - w/2, ex.y - h/2, w, h);
      c.globalAlpha = 1;
      c.strokeStyle = ex.color;
      c.lineWidth = 8;
      c.strokeRect(ex.x - w/2, ex.y - h/2, w, h);
      
      // 如果图片已加载成功，显示图片
      if (ex.image && ex.imageLoaded && ex.image.complete) {
        try {
          c.drawImage(ex.image, ex.x - w/2, ex.y - h/2, w, h);
          // 图片下方不显示文字（按用户要求移除）
        } catch (e) {
          // 图片绘制失败，显示文字
          this.drawExhibitText(c, ex, w, h);
        }
      } else {
        // 没有图片或未加载，显示文字
        this.drawExhibitText(c, ex, w, h);
      }
    } else {
      // 未翻转：显示问号
      c.fillStyle = 'rgba(100,100,150,0.3)';
      c.fillRect(ex.x - w/2, ex.y - h/2, w, h);
      c.strokeStyle = '#7788aa';
      c.lineWidth = 6;
      c.strokeRect(ex.x - w/2, ex.y - h/2, w, h);
      
      c.fillStyle = '#9999cc';
      c.font = 'bold 160px "Press Start 2P"';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText('?', ex.x, ex.y - 10);
    }
  }
  
  drawExhibitText(c, ex, w, h) {
    // 降级方案：显示文字标签
    c.fillStyle = '#fff';
    c.font = 'bold 48px "Noto Sans TC"';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(ex.label, ex.x, ex.y);
  }
  
  drawParticle(c, p) {
    c.save();
    c.translate(p.x, p.y);
    if (p.rotation) c.rotate(p.rotation);
    c.fillStyle = p.color;
    c.globalAlpha = p.life * 0.8;
    
    if (p.type === 'star') {
      this.drawStar(c, 0, 0);
    } else {
      c.fillRect(-4, -2, 3, 3);
      c.fillRect(1, -2, 3, 3);
      c.fillRect(-5, 1, 10, 3);
      c.fillRect(-4, 4, 8, 3);
      c.fillRect(-3, 7, 6, 3);
      c.fillRect(-2, 10, 4, 2);
    }
    
    c.globalAlpha = 1;
    c.restore();
  }
  
  animate() {
    const now = performance.now();
    const dt = Math.min((now - this.lastTime) / 1000, 0.1);
    this.lastTime = now;
    
    this.update(dt);
    this.render();
    
    requestAnimationFrame(() => this.animate());
  }
  
  showDialog(speaker, text, cls) {
    const ui = document.getElementById('ui');
    ui.innerHTML = `
      <div class="overlay-text">
        <div class="speaker ${cls}">${speaker}</div>
        <div class="text">${text}</div>
      </div>
    `;
  }
  
  hideDialog() {
    document.getElementById('ui').innerHTML = '';
  }
  
  triggerMirrorWipe() {
    const lv = LEVELS[this.level];
    console.log(`🪞 触发魔镜传送！关卡: ${this.level}, 颜色: ${lv.accent}`);
    
    const ui = document.getElementById('ui');
    
    // 创建魔镜传送特效
    const wipeDiv = document.createElement('div');
    wipeDiv.className = 'mirror-wipe';
    wipeDiv.style.setProperty('--wipe-color', lv.accent);
    ui.appendChild(wipeDiv);
    
    // 1.5秒后移除特效并继续下一关
    setTimeout(() => {
      wipeDiv.remove();
      this.transitioning = false;
      this.scriptIndex++;
      console.log(`传送完成，scriptIndex 增加到: ${this.scriptIndex}`);
      this.executeScript();
    }, 1500);
  }
  
  showLevelTitle(title) {
    const ui = document.getElementById('ui');
    ui.innerHTML = `<div class="level-title">${title}</div>`;
    setTimeout(() => {
      ui.innerHTML = '';
    }, 3000);
  }
  
  showEnding() {
    console.log('🎉 showEnding 函数被调用！');
    
    // 切换到结尾场景（和开头一样的背景：小羊站在魔镜前）
    this.mode = 'title';
    this.transitioning = false;
    this.sheep.x = this.width / 2;
    this.sheep.y = 520;
    this.cameraX = 0;
    this.collected = 0;
    this.exhibits = [];
    this.particles = [];
    this.autoMoving = false;
    
    console.log('显示第一段结局对话...');
    // 显示第一段结局对话
    this.showDialog('小 羊', '魔鏡啊魔鏡，我收集了所有記憶！現在告訴我，誰是最棒的領頭羊？', 'sheep');
    
    // 4秒后显示第二段对话
    setTimeout(() => {
      console.log('显示第二段结局对话...');
      this.showDialog('魔 羊  &  小 羊', '是 資 管 系 !! 🎉', 'both');
      
      // 再5秒后回到开头场景并显示"再播放一次"按钮
      setTimeout(() => {
        console.log('显示再播放按钮...');
        this.hideDialog();
        this.showReplayButton();
      }, 5000);
    }, 4000);
  }
  
  showReplayButton() {
    const ui = document.getElementById('ui');
    ui.innerHTML = `
      <div class="title-overlay">
        <div class="title-logo">翻轉魔羊</div>
        <div class="title-sub">第十五屆領頭羊 · 資管系</div>
        <button class="play-btn" id="replayBtn">再播放一次</button>
      </div>
    `;
    document.getElementById('replayBtn').onclick = () => this.restart();
  }
  
  restart() {
    // 重置所有状态并重新开始
    this.mode = 'playing';
    this.scriptIndex = 0;
    this.level = 0;
    this.collected = 0;
    this.cameraX = 0;
    this.transitioning = false;  // 重置传送标志
    this.sheep.x = 640;
    this.sheep.y = 520;
    this.sheep.vx = 0;
    this.exhibits = [];
    this.particles = [];
    this.autoMoving = false;
    
    const ui = document.getElementById('ui');
    ui.innerHTML = '';
    
    // 重新开始动画
    this.startAuto();
  }
}

const canvas = document.getElementById('canvas');
const game = new AutoPlayGame(canvas);

const ui = document.getElementById('ui');
ui.innerHTML = `
  <div class="title-overlay">
    <div class="title-logo">翻轉魔羊</div>
    <div class="title-sub">第十五屆領頭羊 · 資管系</div>
    <button class="play-btn" id="playBtn">▶ 播放動畫</button>
  </div>
`;

document.getElementById('playBtn').onclick = () => {
  ui.innerHTML = '';
  game.startAuto();
};
</script>
