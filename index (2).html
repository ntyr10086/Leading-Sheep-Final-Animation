<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>魔鏡啊魔鏡 — 第十五屆領頭羊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #060a14;
    --bg-deep-2:  #0a1228;
    --neon-cyan:  #00f5ff;
    --neon-cyan-d:#0098a8;
    --silver:     #c8d8e8;
    --purple:     #5533ff;
    --purple-l:   #8a6dff;
    --pixel-green:#00ff88;
    --hot-pink:   #ff2b9d;
    --warn-amber: #ffb648;
    --shadow-deep:#02040a;
    --pixel-font: 'Press Start 2P', system-ui, monospace;
    --tc-font:    'Noto Sans TC', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-deep);
    color: var(--silver);
    font-family: var(--pixel-font);
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
    cursor: crosshair;
  }

  /* ─── starfield background layers ─── */
  #stars, #stars2, #stars3 {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  #stars  { background-image: radial-gradient(1px 1px at 20% 30%, #fff, transparent 60%),
                              radial-gradient(1px 1px at 70% 60%, #fff, transparent 60%),
                              radial-gradient(1px 1px at 40% 80%, #fff, transparent 60%),
                              radial-gradient(1px 1px at 85% 20%, #fff, transparent 60%),
                              radial-gradient(1px 1px at 10% 50%, #fff, transparent 60%);
            background-size: 600px 600px;
            animation: drift 60s linear infinite; opacity: .55; }
  #stars2 { background-image: radial-gradient(1px 1px at 33% 75%, var(--neon-cyan), transparent 60%),
                              radial-gradient(1px 1px at 66% 25%, var(--purple-l), transparent 60%),
                              radial-gradient(1px 1px at 90% 90%, var(--pixel-green), transparent 60%);
            background-size: 800px 800px;
            animation: drift 90s linear infinite reverse; opacity: .35; }
  #stars3 { background:
              radial-gradient(ellipse at 70% 10%, rgba(85,51,255,.18), transparent 60%),
              radial-gradient(ellipse at 10% 90%, rgba(0,245,255,.12), transparent 60%),
              radial-gradient(ellipse at 90% 60%, rgba(255,43,157,.08), transparent 60%);
            opacity: 1; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(-300px, -300px); } }

  /* ─── scanline crt overlay ─── */
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,.18) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: multiply;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 9998;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  /* ─── canvas ─── */
  #game {
    position: fixed; inset: 0; z-index: 5;
    width: 100%; height: 100%;
    display: block;
  }

  /* ─── HUD ─── */
  .hud {
    position: fixed; z-index: 50;
    pointer-events: none;
  }
  .hud-top {
    top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 14px; align-items: center;
    padding: 10px 18px;
    background: linear-gradient(180deg, rgba(0,245,255,.08), rgba(85,51,255,.05));
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 0 2px var(--shadow-deep), 0 0 24px rgba(0,245,255,.3) inset, 0 0 30px rgba(0,245,255,.25);
    font-size: 10px; letter-spacing: 1px;
  }
  .hud-top .stage-pip {
    width: 14px; height: 14px;
    border: 2px solid var(--silver);
    background: var(--bg-deep);
    image-rendering: pixelated;
  }
  .hud-top .stage-pip.active { background: var(--pixel-green); border-color: var(--pixel-green); box-shadow: 0 0 8px var(--pixel-green); }
  .hud-top .stage-pip.done { background: var(--neon-cyan); border-color: var(--neon-cyan); }

  .hud-bottom-left {
    bottom: 16px; left: 16px;
    font-size: 8px; opacity: .7; line-height: 1.6;
  }
  .hud-bottom-right {
    bottom: 16px; right: 16px;
    font-size: 8px;
    pointer-events: auto;
  }
  .key-hint {
    display: inline-block;
    background: var(--bg-deep);
    border: 2px solid var(--neon-cyan);
    padding: 6px 10px;
    box-shadow: 0 3px 0 var(--neon-cyan-d);
    margin: 0 3px;
    color: var(--neon-cyan);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 3px 0 var(--neon-cyan-d), 0 0 0 transparent; }
    50%      { box-shadow: 0 3px 0 var(--neon-cyan-d), 0 0 14px var(--neon-cyan); }
  }

  .photo-counter {
    display: flex; gap: 6px; align-items: center;
    background: var(--bg-deep);
    border: 2px solid var(--purple-l);
    padding: 8px 12px;
    box-shadow: 0 3px 0 var(--purple);
    font-size: 9px;
    color: var(--purple-l);
  }
  .photo-counter .icon { color: var(--pixel-green); }

  /* ─── Dialog box ─── */
  .dialog {
    position: fixed; z-index: 100;
    left: 50%; bottom: 90px; transform: translateX(-50%);
    width: min(720px, 90vw);
    background: var(--bg-deep);
    border: 3px solid var(--neon-cyan);
    box-shadow:
      0 0 0 3px var(--shadow-deep),
      0 0 24px rgba(0,245,255,.4),
      inset 0 0 0 1px rgba(0,245,255,.2);
    padding: 18px 22px 20px;
    font-family: var(--tc-font);
    font-weight: 500;
    font-size: 16px;
    line-height: 1.7;
    letter-spacing: 1px;
    color: var(--silver);
    display: none;
    animation: dialog-pop .25s ease-out;
  }
  .dialog.show { display: block; }
  .dialog .speaker {
    font-family: var(--pixel-font);
    font-size: 10px;
    color: var(--neon-cyan);
    margin-bottom: 8px;
    letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .dialog .speaker::before {
    content: '▶';
    color: var(--pixel-green);
    animation: blink 1s steps(2) infinite;
  }
  .dialog .speaker.mirror { color: var(--purple-l); }
  .dialog .speaker.mirror::before { color: var(--hot-pink); }
  .dialog .speaker.both  { color: var(--pixel-green); }
  .dialog .text {
    min-height: 55px;
  }
  .dialog .continue {
    margin-top: 10px;
    text-align: right;
    font-family: var(--pixel-font);
    font-size: 8px;
    color: var(--neon-cyan);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes dialog-pop {
    0% { transform: translateX(-50%) translateY(20px); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* the corner indicator pointing dialog at the speaker */
  .dialog::before {
    content: ''; position: absolute;
    top: -10px; left: 36px;
    width: 16px; height: 10px;
    background: var(--bg-deep);
    border-left: 3px solid var(--neon-cyan);
    border-top: 3px solid var(--neon-cyan);
    transform: rotate(45deg);
  }

  /* ─── Password input panel ─── */
  .password-panel {
    position: fixed; z-index: 200;
    inset: 0;
    background: radial-gradient(circle at center, rgba(85,51,255,.2), rgba(6,10,20,.92));
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    animation: fade-in .35s ease-out;
  }
  .password-panel.show { display: flex; }
  .password-card {
    width: min(520px, 92vw);
    background: var(--bg-deep);
    border: 4px solid var(--purple-l);
    padding: 28px 28px 26px;
    box-shadow:
      0 0 0 4px var(--shadow-deep),
      0 0 36px rgba(138,109,255,.55),
      inset 0 0 24px rgba(138,109,255,.18);
    text-align: center;
    position: relative;
  }
  .password-card::before, .password-card::after {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    border: 3px solid var(--pixel-green);
  }
  .password-card::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .password-card::after  { bottom: -3px; right: -3px; border-left: none; border-top: none; }

  .password-card .header {
    font-size: 11px; letter-spacing: 2px;
    color: var(--purple-l);
    margin-bottom: 14px;
  }
  .password-card .prompt {
    font-family: var(--tc-font);
    font-weight: 700;
    font-size: 18px;
    color: var(--neon-cyan);
    margin-bottom: 22px;
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(0,245,255,.6);
  }
  .password-card input {
    width: 100%;
    background: var(--shadow-deep);
    border: 3px solid var(--neon-cyan);
    color: var(--pixel-green);
    font-family: var(--tc-font);
    font-weight: 700;
    font-size: 18px;
    padding: 14px 16px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    box-shadow: inset 0 0 12px rgba(0,245,255,.15);
    caret-color: var(--pixel-green);
  }
  .password-card input:focus {
    border-color: var(--pixel-green);
    box-shadow: inset 0 0 16px rgba(0,255,136,.25), 0 0 16px rgba(0,255,136,.4);
  }
  .password-card .hint {
    margin-top: 12px;
    font-size: 8px;
    color: var(--silver);
    opacity: .6;
    letter-spacing: 1px;
  }
  .password-card .err {
    margin-top: 10px;
    font-family: var(--tc-font);
    font-weight: 700;
    font-size: 14px;
    color: var(--hot-pink);
    min-height: 22px;
    letter-spacing: 1px;
  }
  .password-card .err.shake { animation: shake .4s ease; }
  @keyframes shake {
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-4px); }
  }

  .submit-btn {
    margin-top: 16px;
    background: var(--purple);
    color: white;
    font-family: var(--pixel-font);
    font-size: 10px;
    border: 3px solid var(--purple-l);
    padding: 10px 22px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--shadow-deep);
    letter-spacing: 2px;
    transition: transform .08s;
  }
  .submit-btn:hover { background: var(--purple-l); }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--shadow-deep); }

  /* ─── Photo gallery overlay ─── */
  .gallery {
    position: fixed; z-index: 250;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,245,255,.15), rgba(6,10,20,.95));
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    animation: fade-in .4s ease-out;
  }
  .gallery.show { display: flex; }
  .gallery h2 {
    font-size: 14px; color: var(--neon-cyan);
    letter-spacing: 3px; margin-bottom: 6px;
    text-shadow: 0 0 12px rgba(0,245,255,.6);
  }
  .gallery .sub {
    font-family: var(--tc-font); font-weight: 500;
    font-size: 14px; color: var(--silver); margin-bottom: 22px;
    letter-spacing: 2px; opacity: .85;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 160px);
    grid-gap: 14px;
  }
  .photo-frame {
    width: 160px; height: 120px;
    background: var(--shadow-deep);
    border: 3px solid var(--neon-cyan);
    box-shadow: 0 0 0 3px var(--bg-deep), 0 0 16px rgba(0,245,255,.4);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    opacity: 0; transform: scale(.6);
    animation: photo-pop .5s ease-out forwards;
  }
  .photo-frame:nth-child(1) { animation-delay: .05s; }
  .photo-frame:nth-child(2) { animation-delay: .15s; }
  .photo-frame:nth-child(3) { animation-delay: .25s; }
  .photo-frame:nth-child(4) { animation-delay: .35s; }
  .photo-frame:nth-child(5) { animation-delay: .45s; }
  .photo-frame:nth-child(6) { animation-delay: .55s; }
  .photo-frame:nth-child(7) { animation-delay: .65s; }
  .photo-frame:nth-child(8) { animation-delay: .75s; }
  @keyframes photo-pop {
    0%   { opacity: 0; transform: scale(.6) rotate(-8deg); }
    60%  { transform: scale(1.08) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .photo-frame .pf-art { width: 100%; height: 70%; display: block; }
  .photo-frame .pf-label {
    font-family: var(--tc-font); font-weight: 700;
    font-size: 11px; color: var(--silver);
    text-align: center;
    padding: 4px 6px; letter-spacing: 1px;
    background: var(--bg-deep);
    width: 100%; border-top: 2px solid var(--neon-cyan-d);
    flex-grow: 1; display: flex; align-items: center; justify-content: center;
  }
  .photo-frame .pf-num {
    position: absolute; top: 4px; left: 4px;
    font-size: 8px; color: var(--pixel-green);
    background: var(--shadow-deep); padding: 2px 4px;
    border: 1px solid var(--pixel-green);
    letter-spacing: 1px;
  }
  .gallery .next-btn {
    margin-top: 28px;
    background: var(--bg-deep);
    color: var(--pixel-green);
    border: 3px solid var(--pixel-green);
    padding: 14px 30px;
    font-family: var(--pixel-font);
    font-size: 11px; letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 4px 0 #008844, 0 0 20px rgba(0,255,136,.4);
    opacity: 0; transform: translateY(20px);
    animation: btn-rise .6s ease-out 1.4s forwards;
  }
  .gallery .next-btn:hover { background: var(--pixel-green); color: var(--bg-deep); }
  .gallery .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #008844; }
  @keyframes btn-rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* ─── transition flash ─── */
  .flash {
    position: fixed; inset: 0; z-index: 500;
    background: white; pointer-events: none;
    opacity: 0;
  }
  .flash.go { animation: flash-anim .9s ease-out; }
  @keyframes flash-anim {
    0% { opacity: 0; }
    25% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ─── ending celebration overlay ─── */
  .ending-shout {
    position: fixed; z-index: 400;
    inset: 0;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    background: radial-gradient(circle at center, rgba(255,43,157,.25), rgba(6,10,20,.85));
  }
  .ending-shout.show { display: flex; animation: fade-in .4s ease; }
  .ending-shout .megatext {
    font-family: var(--tc-font); font-weight: 700;
    font-size: 88px; letter-spacing: 6px;
    background: linear-gradient(180deg, #fff, var(--neon-cyan), var(--pixel-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 24px rgba(0,245,255,.6);
    animation: mega-pop .6s ease-out;
  }
  @keyframes mega-pop {
    0% { transform: scale(.5) rotate(-3deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(2deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .ending-shout .small {
    font-family: var(--pixel-font); font-size: 14px;
    color: var(--silver); margin-top: 18px; letter-spacing: 4px;
  }
  .ending-shout .stamp {
    margin-top: 30px;
    font-family: var(--pixel-font); font-size: 11px;
    color: var(--warn-amber); letter-spacing: 3px;
    border: 3px dashed var(--warn-amber);
    padding: 10px 18px;
    transform: rotate(-3deg);
    box-shadow: 0 0 18px rgba(255,182,72,.4);
  }
  .ending-shout .replay {
    margin-top: 26px;
    background: var(--bg-deep); color: var(--neon-cyan);
    border: 3px solid var(--neon-cyan);
    padding: 12px 26px;
    font-family: var(--pixel-font); font-size: 10px;
    letter-spacing: 3px; cursor: pointer;
    box-shadow: 0 4px 0 var(--neon-cyan-d);
  }
  .ending-shout .replay:hover { background: var(--neon-cyan); color: var(--bg-deep); }

  /* ─── Title intro overlay ─── */
  .title-screen {
    position: fixed; z-index: 300;
    inset: 0;
    background: var(--bg-deep);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    animation: fade-in .5s;
  }
  .title-screen.hide { display: none; }
  .title-screen .logo-canvas { width: 200px; height: 200px; image-rendering: pixelated; margin-bottom: 18px; }
  .title-screen h1 {
    font-family: var(--tc-font); font-weight: 700;
    font-size: 38px; letter-spacing: 4px;
    background: linear-gradient(180deg, var(--silver), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center; margin-bottom: 8px;
  }
  .title-screen .sub {
    font-size: 11px; color: var(--purple-l); letter-spacing: 4px;
    margin-bottom: 30px;
  }
  .title-screen .start-btn {
    background: var(--bg-deep); color: var(--neon-cyan);
    border: 3px solid var(--neon-cyan);
    padding: 16px 36px; font-family: var(--pixel-font);
    font-size: 12px; letter-spacing: 3px; cursor: pointer;
    box-shadow: 0 5px 0 var(--neon-cyan-d), 0 0 24px rgba(0,245,255,.3);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .title-screen .start-btn:hover { background: var(--neon-cyan); color: var(--bg-deep); }
  .title-screen .credit {
    position: absolute; bottom: 20px;
    font-size: 8px; color: var(--silver); opacity: .5; letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="stars"></div>
<div id="stars2"></div>
<div id="stars3"></div>

<canvas id="game"></canvas>

<!-- HUD -->
<div class="hud hud-top" id="hudTop" style="display:none;">
  <span style="color:var(--silver);">第十五屆領頭羊</span>
  <span style="color:var(--neon-cyan);">·</span>
  <div class="stage-pip" data-stage="1"></div>
  <div class="stage-pip" data-stage="2"></div>
  <div class="stage-pip" data-stage="3"></div>
  <span style="color:var(--neon-cyan);">·</span>
  <span id="stageLabel" style="color:var(--pixel-green); font-size:9px;">INTRO</span>
</div>

<div class="hud hud-bottom-left" id="hudInstr">
  <div>滑鼠移動 = 駕駛飛船</div>
  <div>靠近魔鏡 = 觸發互動</div>
  <div>SPACE = 動作 / 跳躍 / 射擊</div>
</div>

<div class="hud hud-bottom-right" id="hudCounter" style="display:none;">
  <div class="photo-counter">
    <span class="icon">★</span>
    <span>記憶 <span id="photoCount">0</span> / 8</span>
  </div>
</div>

<!-- Dialog -->
<div class="dialog" id="dialog">
  <div class="speaker" id="speaker">SPEAKER</div>
  <div class="text" id="dialogText"></div>
  <div class="continue" id="continueHint">[ SPACE 繼續 ]</div>
</div>

<!-- Password panel -->
<div class="password-panel" id="passwordPanel">
  <div class="password-card">
    <div class="header">▼ MIRROR MEMORY GATE ▼</div>
    <div class="prompt" id="passwordPrompt">輸入咒語密碼解鎖魔鏡記憶</div>
    <input type="text" id="passwordInput" autocomplete="off" placeholder="輸入咒語..." />
    <div class="err" id="passwordErr">&nbsp;</div>
    <button class="submit-btn" id="passwordBtn">解 鎖</button>
    <div class="hint">提示:<span id="passwordHint">校園內常用工具</span></div>
  </div>
</div>

<!-- Photo gallery -->
<div class="gallery" id="gallery">
  <h2 id="galleryTitle">★ MEMORY UNLOCKED ★</h2>
  <div class="sub" id="gallerySub">魔鏡記憶 · 第一章</div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <button class="next-btn" id="galleryNext">前 往 下 一 關 ▶</button>
</div>

<div class="flash" id="flash"></div>

<!-- Ending overlay -->
<div class="ending-shout" id="endingShout">
  <div class="megatext">是 資 管 系 !!</div>
  <div class="small">第十五屆領頭羊 · 2026</div>
  <div class="stamp">★ MIRROR MIRROR PROOF ★</div>
  <button class="replay" id="replayBtn">⟲ RESTART JOURNEY</button>
</div>

<!-- Title screen -->
<div class="title-screen" id="titleScreen">
  <canvas class="logo-canvas" id="logoCanvas" width="64" height="64"></canvas>
  <h1>魔鏡啊魔鏡</h1>
  <div class="sub">MIRROR · MIRROR · ON · THE · WALL</div>
  <button class="start-btn" id="startBtn">▶ PRESS START ◀</button>
  <div class="credit">© 2026 · 第十五屆領頭羊 · 資管系</div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   MIRROR MIRROR — Pixel Sheep Cosmic Adventure
   ════════════════════════════════════════════════════════════════════ */

const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W = 0, H = 0;
function resize() {

/* ════════════════════════════════════════════════════════════════════
   Rendering helpers
   ════════════════════════════════════════════════════════════════════ */

function px(c, x, y, w, h, color) {
  c.fillStyle = color;
  c.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

/* The pixel sheep mascot — drawn from a small pixel grid scaled up */
function drawSheep(c, cx, cy, scale = 4, t = 0) {
  // sheep body coordinates (in grid units, 16x14 grid)
  const sway = Math.sin(t * 3) * 1; // idle
  const body = [
    // [x,y,w,h, color]
    [4, 5, 8, 6, '#c8d8e8'], // body main
    [3, 6, 1, 4, '#c8d8e8'],
    [12,6, 1, 4, '#c8d8e8'],
    [5, 4, 6, 1, '#c8d8e8'], // top fluff
    [4, 3, 2, 2, '#c8d8e8'],
    [10,3, 2, 2, '#c8d8e8'],
    [6, 2, 4, 2, '#c8d8e8'],
    // shadow / underbelly
    [4, 10, 8, 1, '#7a8ba0'],
    // sunglasses (black frame)
    [4, 6, 8, 2, '#080808'],
    // green lenses
    [5, 7, 2, 1, '#00ff88'],
    [9, 7, 2, 1, '#00ff88'],
    // chest "01"
    [6, 9, 1, 1, '#00f5ff'],
    [9, 9, 1, 1, '#00f5ff'],
    // legs
    [5, 11, 2, 2, '#3a4a60'],
    [9, 11, 2, 2, '#3a4a60'],
    // ear flicker
    [3, 5, 1, 1, '#a0b0c0'],
    [12,5, 1, 1, '#a0b0c0'],
  ];
  c.save();
  c.translate(cx, cy + sway);
  for (const [x,y,w,h, color] of body) {
    px(c, (x-8)*scale, (y-7)*scale, w*scale, h*scale, color);
  }
  c.restore();
}

/* Pixel spaceship under the sheep */
function drawShip(c, cx, cy, scale = 4, engineT = 0) {
  c.save();
  c.translate(cx, cy);
  // hull
  const ship = [
    [2, 0, 12, 3, '#5533ff'],
    [1, 1, 14, 2, '#5533ff'],
    [3, 3, 10, 1, '#3a1aaa'],
    [4, 4, 8, 1, '#2a0a88'],
    // cockpit highlight
    [4, 0, 8, 1, '#8a6dff'],
    [5,-1, 6, 1, '#8a6dff'],
    // side fins
    [0, 0, 1, 2, '#00f5ff'],
    [15,0, 1, 2, '#00f5ff'],
    // bottom thrusters
    [3, 5, 2, 1, '#ffb648'],
    [11,5, 2, 1, '#ffb648'],
  ];
  for (const [x,y,w,h, color] of ship) {
    px(c, (x-8)*scale, (y)*scale, w*scale, h*scale, color);
  }
  // engine glow
  const glow = (Math.sin(engineT * 8) + 1) / 2;
  c.fillStyle = `rgba(0, 245, 255, ${0.3 + glow*0.4})`;
  c.fillRect(-6*scale, 6*scale, 12*scale, 1*scale);
  c.restore();
}

/* The Magic Mirror — sheep-body shaped frame */
function drawMirror(c, cx, cy, scale = 5, t = 0, options = {}) {
  const glow = options.glow ?? 1;
  const showEyes = options.showEyes ?? false;
  const interior = options.interior ?? 'reflect';
  const accent = options.accent ?? '#00f5ff';

  c.save();
  c.translate(cx, cy);

  // outer glow halo
  if (glow > 0) {
    const halo = ctx.createRadialGradient(0, 0, scale*4, 0, 0, scale*22);
    halo.addColorStop(0, `rgba(0, 245, 255, ${0.4 * glow})`);
    halo.addColorStop(1, 'rgba(0, 245, 255, 0)');
    c.fillStyle = halo;
    c.fillRect(-scale*22, -scale*22, scale*44, scale*44);
  }

  // sheep-shaped frame (outer)
  const frame = [
    // top fluff
    [-3, -10, 6, 2, accent],
    [-5, -8,  2, 2, accent],
    [3,  -8,  2, 2, accent],
    [-7, -6,  14, 2, accent],
    // body sides
    [-9, -4, 2, 12, accent],
    [7,  -4, 2, 12, accent],
    // bottom
    [-7, 8,  14, 2, accent],
    [-5, 10, 2, 2, accent],
    [3,  10, 2, 2, accent],
    [-3, 10, 6, 2, accent],
  ];
  for (const [x,y,w,h, col] of frame) {
    px(c, x*scale, y*scale, w*scale, h*scale, col);
  }
  // inner darker frame
  const inner = '#080814';
  px(c, -7*scale, -6*scale, 14*scale, 14*scale, inner);

  // mirror interior — animated reflection
  if (interior === 'reflect') {
    // base
    px(c, -6*scale, -5*scale, 12*scale, 12*scale, '#1a2a4a');
    // shimmer bands
    const shimmer = (Math.sin(t * 2) + 1) / 2;
    c.fillStyle = `rgba(200, 216, 232, ${0.15 + shimmer * 0.18})`;
    c.fillRect(-6*scale, (-5 + Math.sin(t * 1.3) * 4)*scale, 12*scale, 2*scale);
    c.fillStyle = `rgba(0, 245, 255, ${0.12 + shimmer * 0.15})`;
    c.fillRect(-6*scale, (-2 + Math.cos(t * 1.7) * 5)*scale, 12*scale, 1*scale);
    // sparkles
    for (let i = 0; i < 4; i++) {
      const a = t * 0.7 + i * 1.5;
      const sx = Math.cos(a) * 3 * scale;
      const sy = Math.sin(a * 0.8) * 3 * scale;
      px(c, sx-scale*0.5, sy-scale*0.5, scale, scale, '#ffffff');
    }
  } else if (interior === 'portal') {
    // swirling portal
    const r = ctx.createRadialGradient(0, 0, 0, 0, 0, scale*7);
    r.addColorStop(0, '#ffffff');
    r.addColorStop(0.3, accent);
    r.addColorStop(1, '#5533ff');
    c.fillStyle = r;
    c.fillRect(-6*scale, -5*scale, 12*scale, 12*scale);
  }

  // cute eyes appear when sheep is close
  if (showEyes) {
    const blinkT = (Math.sin(t * 4) + 1) / 2;
    const blinkH = blinkT > 0.92 ? 0.4 : 1;
    px(c, -3*scale, 0*scale, 2*scale, 2*scale*blinkH, '#ffffff');
    px(c,  1*scale, 0*scale, 2*scale, 2*scale*blinkH, '#ffffff');
    px(c, -2.5*scale, 0.5*scale, 1*scale, 1*scale*blinkH, '#080808');
    px(c,  1.5*scale, 0.5*scale, 1*scale, 1*scale*blinkH, '#080808');
    // tiny smile
    px(c, -1*scale, 3*scale, 2*scale, 0.6*scale, '#ffb648');
  }

  c.restore();
}

/* Particle systems */
class ParticleSys {
  constructor() { this.list = []; }
  emit(x, y, opts = {}) {
    const n = opts.n ?? 1;
    for (let i = 0; i < n; i++) {
      this.list.push({
        x, y,
        vx: (opts.vx ?? 0) + (Math.random()-0.5) * (opts.spread ?? 1),
        vy: (opts.vy ?? 0) + (Math.random()-0.5) * (opts.spread ?? 1),
        life: opts.life ?? 30,
        max:  opts.life ?? 30,
        size: opts.size ?? 3,
        color: opts.color ?? '#00f5ff',
        gravity: opts.gravity ?? 0,
      });
    }
  }
  step() {
    for (const p of this.list) {
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
      p.life--;
    }
    this.list = this.list.filter(p => p.life > 0);
  }
  draw(c) {
    for (const p of this.list) {
      const a = p.life / p.max;
      c.globalAlpha = a;
      px(c, p.x - p.size/2, p.y - p.size/2, p.size, p.size, p.color);
    }
    c.globalAlpha = 1;
  }
}
const particles = new ParticleSys();

/* ════════════════════════════════════════════════════════════════════
   Sheep Player (mouse follower)
   ════════════════════════════════════════════════════════════════════ */
const sheep = {
  x: W/2, y: H/2,
  vx: 0, vy: 0,
  targetX: W/2, targetY: H/2,
  step(dt) {
    this.targetX = mouse.x;
    this.targetY = mouse.y;
    // inertia: spring toward target
    const k = 0.08, damp = 0.82;
    this.vx += (this.targetX - this.x) * k;
    this.vy += (this.targetY - this.y) * k;
    this.vx *= damp; this.vy *= damp;
    this.x += this.vx; this.y += this.vy;

    // engine particles
    if (Math.hypot(this.vx, this.vy) > 0.4) {
      particles.emit(this.x + (Math.random()-0.5)*16, this.y + 28, {
        vx: -this.vx * 0.3, vy: 1 + Math.random()*0.6,
        size: 2 + Math.random()*2,
        life: 18 + Math.random()*10,
        color: Math.random() > 0.5 ? '#00f5ff' : '#5533ff',
      });
    }
  },
  draw(c, t) {
    drawShip(c, this.x, this.y + 22, 3, t);
    drawSheep(c, this.x, this.y, 3, t);
  },
};

/* ════════════════════════════════════════════════════════════════════
   Mirrors / NPCs
   ════════════════════════════════════════════════════════════════════ */
class MirrorObject {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.scale = opts.scale ?? 5;
    this.interior = opts.interior ?? 'reflect';
    this.accent = opts.accent ?? '#00f5ff';
    this.label = opts.label ?? null;
  }
  isNear(px, py, r = 130) {
    return Math.hypot(this.x - px, this.y - py) < r;
  }
  draw(c, t) {
    const near = this.isNear(sheep.x, sheep.y);
    drawMirror(c, this.x, this.y, this.scale, t, {
      interior: this.interior, accent: this.accent,
      glow: 0.6 + 0.4 * Math.sin(t * 1.5),
      showEyes: near,
    });
    if (this.label) {
      c.font = '10px "Press Start 2P", monospace';
      c.textAlign = 'center';
      c.fillStyle = this.accent;
      c.shadowColor = '#000'; c.shadowBlur = 4;
      c.fillText(this.label, this.x, this.y + this.scale * 16);
      c.shadowBlur = 0;
    }
  }
}

/* ────────────────────────────────────────────────────────────────────
   Photo cards (collected during levels)
   ──────────────────────────────────────────────────────────────────── */
class PhotoMirror {
  constructor(x, y, idx, label, accent) {
    this.x = x; this.y = y; this.idx = idx;
    this.label = label; this.accent = accent;
    this.collected = false;
    this.bounceT = Math.random() * 6;
  }
  step(dt) {
    this.bounceT += dt;
    if (!this.collected && Math.hypot(this.x - sheep.x, this.y - sheep.y) < 60) {
      this.collected = true;
      state.collected++;
      updateCounter();
      // burst
      for (let i = 0; i < 28; i++) {
        particles.emit(this.x, this.y, {
          vx: (Math.random()-0.5)*6,
          vy: (Math.random()-0.5)*6,
          size: 2 + Math.random()*3,
          life: 30 + Math.random()*20,
          color: Math.random() > 0.4 ? this.accent : '#ffffff',
        });
      }
      flashSmall();
    }
  }
  draw(c, t) {
    if (this.collected) return;
    const bob = Math.sin(this.bounceT * 2) * 4;
    drawMirror(c, this.x, this.y + bob, 3, t, {
      interior: 'reflect',
      accent: this.accent,
      glow: 0.7,
      showEyes: false,
    });
    // tiny number tag
    c.font = '8px "Press Start 2P", monospace';
    c.fillStyle = this.accent;
    c.textAlign = 'center';
    c.fillText('#' + (this.idx + 1), this.x, this.y + bob - 50);
  }
}

/* ────────────────────────────────────────────────────────────────────
   Monsters & obstacles
   ──────────────────────────────────────────────────────────────────── */
class Monster {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.t = 0; this.hp = 1; this.dead = false;
    this.color = ['#ff2b9d', '#5533ff', '#ffb648'][Math.floor(Math.random()*3)];
  }
  step(dt) {
    this.t += dt;
    this.x -= 1.6;
    this.y += Math.sin(this.t * 2) * 0.8;
  }
  draw(c) {
    const t = this.t;
    // pixel goblin alien
    const cx = this.x, cy = this.y, s = 3;
    px(c, cx-3*s, cy-3*s, 6*s, 5*s, this.color);
    px(c, cx-4*s, cy-2*s, 1*s, 3*s, this.color);
    px(c, cx+3*s, cy-2*s, 1*s, 3*s, this.color);
    // eyes
    px(c, cx-2*s, cy-2*s, 1*s, 1*s, '#fff');
    px(c, cx+1*s, cy-2*s, 1*s, 1*s, '#fff');
    px(c, cx-2*s, cy-2*s, 0.5*s, 0.5*s, '#000');
    px(c, cx+1*s, cy-2*s, 0.5*s, 0.5*s, '#000');
    // teeth wobble
    const wob = Math.floor(t*3)%2;
    px(c, cx-1*s, cy+1*s, 2*s, 1*s, '#fff');
    px(c, cx-1*s, cy+1*s + wob, 0.5*s, 0.5*s, '#080808');
    // spikes
    px(c, cx-3*s, cy-4*s, 1*s, 1*s, this.color);
    px(c, cx+2*s, cy-4*s, 1*s, 1*s, this.color);
  }
}

class Bullet {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.life = 80;
  }
  step() { this.x += this.vx; this.y += this.vy; this.life--; }
  draw(c) {
    px(c, this.x-3, this.y-3, 6, 6, '#ffffff');
    px(c, this.x-4, this.y-1, 8, 2, '#00ff88');
    particles.emit(this.x, this.y, {
      vx: -this.vx*0.2 + (Math.random()-0.5),
      vy: (Math.random()-0.5),
      size: 2, life: 12, color: '#00ff88',
    });
  }
}

class Obstacle {
  constructor(x, y) {
    this.x = x; this.y = y; this.t = 0;
  }
  step(dt) { this.t += dt; this.x -= 2.0; }
  draw(c) {
    // asteroid rock
    const cx = this.x, cy = this.y, s = 4;
    px(c, cx-3*s, cy-2*s, 6*s, 4*s, '#7a5a3a');
    px(c, cx-4*s, cy-1*s, 1*s, 2*s, '#7a5a3a');
    px(c, cx+3*s, cy-1*s, 1*s, 2*s, '#7a5a3a');
    px(c, cx-2*s, cy-3*s, 4*s, 1*s, '#5a3a1a');
    px(c, cx-1*s, cy-1*s, 2*s, 1*s, '#3a1a08');
    px(c, cx+1*s, cy+1*s, 1*s, 1*s, '#3a1a08');
    // spinning rim glow
    c.fillStyle = `rgba(255, 100, 50, ${0.3 + Math.sin(this.t*3)*0.2})`;
    c.fillRect(cx-4*s, cy+2*s, 8*s, 1*s);
  }
}

/* ────────────────────────────────────────────────────────────────────
   Maze walls (level 1)
   ──────────────────────────────────────────────────────────────────── */
class MazeBlock {
  constructor(x, y, w, h) {
    this.x = x; this.y = y; this.w = w; this.h = h;
  }
  draw(c) {
    // bricks
    px(c, this.x, this.y, this.w, this.h, '#1a3a5a');
    // top edge highlight
    px(c, this.x, this.y, this.w, 4, '#3a6a9a');
    // bottom shadow
    px(c, this.x, this.y + this.h - 4, this.w, 4, '#0a1a2a');
    // brick lines
    for (let y = this.y + 12; y < this.y + this.h - 4; y += 16) {
      px(c, this.x, y, this.w, 2, '#0a1a2a');
    }
    for (let x = this.x + 24; x < this.x + this.w; x += 48) {
      px(c, x, this.y + 4, 2, this.h - 8, '#0a1a2a');
    }
    // glowing edge
    c.strokeStyle = 'rgba(0, 245, 255, .3)';
    c.lineWidth = 1;
    c.strokeRect(this.x + 0.5, this.y + 0.5, this.w - 1, this.h - 1);
  }
  collides(x, y, r = 24) {
    return x + r > this.x && x - r < this.x + this.w &&
           y + r > this.y && y - r < this.y + this.h;
  }
}

/* ════════════════════════════════════════════════════════════════════

const dialogEl  = document.getElementById('dialog');
const speakerEl = document.getElementById('speaker');
const dialogTxt = document.getElementById('dialogText');
const continueHint = document.getElementById('continueHint');

let typewriter = null;

function showDialog(speaker, text, cls = '', autoHideMs = null) {
  speakerEl.className = 'speaker ' + cls;
  speakerEl.textContent = speaker;
  dialogTxt.textContent = '';
  dialogEl.classList.add('show');
  continueHint.style.display = 'none';
  // typewriter
  let i = 0;
  if (typewriter) clearInterval(typewriter);
  typewriter = setInterval(() => {
    dialogTxt.textContent = text.slice(0, ++i);
    if (i >= text.length) {
      clearInterval(typewriter); typewriter = null;
      continueHint.style.display = 'block';
      if (autoHideMs) setTimeout(hideDialog, autoHideMs);
    }
  }, 40);
}
function hideDialog() {
  dialogEl.classList.remove('show');
  if (typewriter) { clearInterval(typewriter); typewriter = null; }
}
function dialogIsTyping() { return !!typewriter; }
function fastForwardDialog(text) {
  if (typewriter) {
    clearInterval(typewriter); typewriter = null;
    dialogTxt.textContent = text;
    continueHint.style.display = 'block';
  }
}

/* ───────── HUD updates ───────── */
function updateHUD() {
  const top = document.getElementById('hudTop');
  const counter = document.getElementById('hudCounter');
  const stage = state.stage;
  const isLevel = [STAGE.L1_GAME, STAGE.L2_GAME, STAGE.L3_GAME].includes(stage);
  top.style.display = (stage !== STAGE.TITLE) ? 'flex' : 'none';
  counter.style.display = isLevel ? 'block' : 'none';

  // stage pips
  const pips = document.querySelectorAll('.stage-pip');
  pips.forEach(p => p.classList.remove('active', 'done'));
  const stageNum = stage.startsWith('l1') ? 1 :
                   stage.startsWith('l2') ? 2 :
                   stage.startsWith('l3') ? 3 : 0;
  if (stageNum >= 1) pips[0].classList.add(stageNum > 1 ? 'done' : 'active');
  if (stageNum >= 2) pips[1].classList.add(stageNum > 2 ? 'done' : 'active');
  if (stageNum >= 3) pips[2].classList.add('active');

  document.getElementById('stageLabel').textContent = stageLabel(stage);
}
function stageLabel(s) {
  return ({
    intro: 'INTRO',
    l1_gate: 'GATE · 1',
    l1_game: 'STAGE · 1 · 校園 GOOGLE',
    l1_end:  'STAGE · 1 CLEAR',
    l2_gate: 'GATE · 2',
    l2_game: 'STAGE · 2 · 健康存摺',

function buildLevel(levelIdx) {
  const lv = LEVELS[levelIdx];
  const length = 3600;          // total scrollable width per level
  state.scrollX = 0;
  const data = {
    levelIdx, length, accent: lv.accent,
    mirrors: [], walls: [], monsters: [], obstacles: [],
  };
  // 8 photo mirrors spaced along the level
  for (let i = 0; i < 8; i++) {
    const px = 380 + i * 380 + (Math.random()-0.5) * 80;
    let py;
    if (levelIdx === 0) {
      // maze: photos in winding pattern
      py = H * 0.32 + Math.sin(i * 1.1) * 110;
    } else if (levelIdx === 1) {
      // shooter: mid-air
      py = H * 0.4 + Math.sin(i * 1.4) * 90;
    } else {
      // jumper: most low, but a few high (require jump)
      py = (i % 2 === 0) ? H * 0.55 : H * 0.4;
    }
    data.mirrors.push(new PhotoMirror(px, py, i, lv.photoLabels[i], lv.accent));
  }

  if (levelIdx === 0) {
    // maze walls — corridor winding
    // top/bottom corridor bounds
    const yTop = H * 0.18;
    const yBot = H * 0.78;
    // top wall
    data.walls.push(new MazeBlock(0, 0, length, yTop));
    // bottom wall
    data.walls.push(new MazeBlock(0, yBot, length, H - yBot));
    // mid blockers — a few obstacles in path
    for (let i = 0; i < 6; i++) {
      const bx = 500 + i * 540;
      const by = (i % 2 === 0) ? yTop : yBot - 140;
      data.walls.push(new MazeBlock(bx, by, 80, 140));
    }
  }
  // goal mirror at end
  goalMirror = new MirrorObject(length - 200, H/2, { scale: 9, accent: lv.accent, interior: 'portal', label: '★ NEXT GATE ★' });
  return data;
}

function startLevel(levelIdx) {
  state.stage = (['l1_game','l2_game','l3_game'][levelIdx]);
  state.collected = 0;
  bullets = []; monsters = []; obstacles = [];
  lastObstacleX = lastMonsterX = 0;
  levelData = buildLevel(levelIdx);
  // place sheep at left
  sheep.x = 100; sheep.y = H/2;

/* ════════════════════════════════════════════════════════════════════
   Stage rendering
   ════════════════════════════════════════════════════════════════════ */

function renderIntro(t) {
  // subtle grid floor
  drawGridFloor(t, '#5533ff');

  // mirror in center
  introMirror.draw(ctx, t);

  // title at top
  ctx.font = '14px "Press Start 2P", monospace';
  ctx.fillStyle = '#c8d8e8';
  ctx.textAlign = 'center';
  ctx.fillText('魔 鏡 啊  魔 鏡', W/2, 70);
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.fillStyle = '#00f5ff';
  ctx.fillText('MIRROR · MIRROR · ON · THE · WALL', W/2, 92);
}

function renderGate(t, levelIdx) {
  drawGridFloor(t, LEVELS[levelIdx].accent);
  // floating cosmos rings
  drawCosmicRings(t, LEVELS[levelIdx].accent);
  if (gateMirror) gateMirror.draw(ctx, t);

  ctx.font = '11px "Press Start 2P", monospace';
  ctx.fillStyle = LEVELS[levelIdx].accent;
  ctx.textAlign = 'center';
  ctx.fillText('★ MIRROR MEMORY GATE ' + (levelIdx + 1) + ' ★', W/2, 80);
}

function drawGridFloor(t, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.18;
  ctx.lineWidth = 1;
  // perspective lines from horizon
  const horizonY = H * 0.55;
  for (let i = -10; i <= 10; i++) {
    ctx.beginPath();
    ctx.moveTo(W/2 + i * 60, horizonY);
    ctx.lineTo(W/2 + i * 600, H + 200);
    ctx.stroke();
  }
  for (let i = 1; i < 14; i++) {
    const yOff = horizonY + i * i * 4;
    if (yOff > H + 100) break;
    ctx.beginPath();
    ctx.moveTo(0, yOff);
    ctx.lineTo(W, yOff);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCosmicRings(t, color) {
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.strokeStyle = color;
  for (let i = 0; i < 3; i++) {
    const r = 120 + i * 80 + Math.sin(t + i) * 8;
    ctx.globalAlpha = 0.15 - i * 0.04;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

function renderLevel(t, levelIdx) {
  const data = levelData;
  // camera follows sheep
  const cameraX = Math.max(0, Math.min(sheep.x - W * 0.3, data.length - W));
  state.scrollX = cameraX;

  ctx.save();
  ctx.translate(-cameraX, 0);

  // background
  if (levelIdx === 0) {
    drawMazeBackground(t);
    for (const w of data.walls) w.draw(ctx);
  } else if (levelIdx === 1) {
    drawSpaceBackground(t, '#5533ff');
  } else {
    drawGroundBackground(t);
  }

  // photo mirrors
  for (const m of data.mirrors) m.draw(ctx, t);
  // goal mirror
  if (state.collected >= 8) goalMirror.draw(ctx, t);

  // monsters / obstacles
  if (levelIdx === 1) {
    for (const m of monsters) m.draw(ctx);
    for (const b of bullets) b.draw(ctx);
  } else if (levelIdx === 2) {
    for (const o of obstacles) o.draw(ctx);
    drawGroundLine();
  }

  ctx.restore();

  // progress bar at top
  drawProgressBar(cameraX / (data.length - W), data.accent);

  // overlay: collect-all hint
  if (state.collected >= 8 && goalMirror) {
    ctx.font = '11px "Press Start 2P", monospace';
    ctx.fillStyle = data.accent;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
    ctx.fillText('★ 前往最右側魔鏡 ★', W/2, 130);
    ctx.shadowBlur = 0;
  }
}

function drawProgressBar(p, color) {
  const x = W * 0.2, y = 130, w = W * 0.6, h = 8;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.strokeRect(x - 2, y - 2, w + 4, h + 4);
  ctx.fillStyle = '#0a1228';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w * Math.max(0, Math.min(1, p)), h);
  ctx.restore();
}

function drawMazeBackground(t) {
  // dark void with circuit lines
  ctx.fillStyle = '#040818';
  ctx.fillRect(state.scrollX, 0, W + 200, H);
  ctx.strokeStyle = '#0a2a4a';
  ctx.lineWidth = 1;
  for (let x = -((state.scrollX) % 60); x < W + 60; x += 60) {
    ctx.beginPath(); ctx.moveTo(x + state.scrollX, 0);
    ctx.lineTo(x + state.scrollX, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(state.scrollX, y);
    ctx.lineTo(state.scrollX + W, y); ctx.stroke();
  }
}
function drawSpaceBackground(t, accent) {
  // big nebula blobs
  const nebula = ctx.createRadialGradient(state.scrollX + W*0.7, H*0.35, 50, state.scrollX + W*0.7, H*0.35, 300);
  nebula.addColorStop(0, 'rgba(85,51,255,.25)');
  nebula.addColorStop(1, 'rgba(85,51,255,0)');
  ctx.fillStyle = nebula;
  ctx.fillRect(state.scrollX, 0, W, H);
  // stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 173 + Math.floor(state.scrollX * 0.5)) % (W + 200);
    const sy = (i * 91) % H;
    px(ctx, state.scrollX + sx, sy, 2, 2, '#c8d8e8');
  }
}
function drawGroundBackground(t) {
  // day-tone purple sky with mountains
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a0a3a');
  sky.addColorStop(1, '#5533ff');
  ctx.fillStyle = sky;
  ctx.fillRect(state.scrollX, 0, W + 200, H);
  // distant mountains
  for (let i = 0; i < 10; i++) {
    const mx = state.scrollX * 0.3 + i * 220;
    const mh = 80 + (i * 47 % 60);
    ctx.fillStyle = '#2a1a5a';
    ctx.beginPath();
    ctx.moveTo(mx, H - 80);
    ctx.lineTo(mx + 110, H - 80 - mh);
    ctx.lineTo(mx + 220, H - 80);
    ctx.closePath();
    ctx.fill();
  }
}
function drawGroundLine() {
  const groundY = H - 80;
  ctx.fillStyle = '#3a1aaa';
  ctx.fillRect(state.scrollX, groundY, W + 200, H - groundY);
  ctx.fillStyle = '#5533ff';
  ctx.fillRect(state.scrollX, groundY, W + 200, 4);
}

/* ════════════════════════════════════════════════════════════════════
   Update loop
   ════════════════════════════════════════════════════════════════════ */
let lastT = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  const t = now / 1000;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#060a14';
  ctx.fillRect(0, 0, W, H);

  particles.step();

  switch (state.stage) {
    case STAGE.TITLE:
      renderTitleScene(t);
      break;
    case STAGE.INTRO:
      sheep.step(dt);
      renderIntro(t);
      sheep.draw(ctx, t);
      // automatic dialog when sheep close to mirror
      if (state.introStep === 0 && introMirror.isNear(sheep.x, sheep.y, 160)) {
        // ready to press space
      }
      break;
    case STAGE.L1_GATE:
    case STAGE.L2_GATE:
    case STAGE.L3_GATE: {
      const idx = state.stage === STAGE.L1_GATE ? 0 : state.stage === STAGE.L2_GATE ? 1 : 2;
      sheep.step(dt);
      renderGate(t, idx);
      sheep.draw(ctx, t);
      break;
    }
    case STAGE.L1_GAME:
    case STAGE.L2_GAME:
    case STAGE.L3_GAME: {
      const idx = state.stage === STAGE.L1_GAME ? 0 : state.stage === STAGE.L2_GAME ? 1 : 2;
      stepLevel(dt, t, idx);
      renderLevel(t, idx);
      // sheep last so on top
      sheep.draw(ctx, t);
      // check goal mirror touch
      if (state.collected >= 8 && goalMirror) {
        const gx = goalMirror.x, gy = goalMirror.y;
        if (Math.hypot(gx - sheep.x, gy - sheep.y) < 80) {
          completeLevel(idx);
        }
      }
      break;
    }
    case STAGE.L1_END:
    case STAGE.L2_END:
    case STAGE.L3_END:
      // gallery overlay handles UI; just draw cosmos
      drawGridFloor(t, '#00f5ff');
      drawCosmicRings(t, '#00f5ff');
      break;
    case STAGE.ENDING:
      sheep.step(dt);
      renderIntro(t);   // same scene as intro
      sheep.draw(ctx, t);
      break;
  }

  particles.draw(ctx);
  mouse.clicked = false;

  requestAnimationFrame(tick);
}

function stepLevel(dt, t, levelIdx) {
  const data = levelData;
  // sheep movement override depending on level
  if (levelIdx === 0) {
    // mouse-follow but constrained by walls
    const oldX = sheep.x, oldY = sheep.y;
    // sheep in world coords: targetX is mouse + scroll
    sheep.targetX = mouse.x + state.scrollX;
    sheep.targetY = mouse.y;
    const k = 0.1, damp = 0.78;
    sheep.vx += (sheep.targetX - sheep.x) * k;
    sheep.vy += (sheep.targetY - sheep.y) * k;
    sheep.vx *= damp; sheep.vy *= damp;
    sheep.x += sheep.vx;
    // wall collide x
    for (const w of data.walls) {
      if (w.collides(sheep.x, oldY, 22)) { sheep.x = oldX; sheep.vx *= -0.4; break; }
    }
    sheep.y += sheep.vy;
    for (const w of data.walls) {
      if (w.collides(sheep.x, sheep.y, 22)) { sheep.y = oldY; sheep.vy *= -0.4; break; }
    }
    // engine
    if (Math.hypot(sheep.vx, sheep.vy) > 0.4) {
      particles.emit(sheep.x + (Math.random()-0.5)*16, sheep.y + 28, {
        vx: -sheep.vx * 0.3, vy: 1 + Math.random()*0.6,
        size: 2 + Math.random()*2, life: 18, color: '#00f5ff',
      });
    }
  } else if (levelIdx === 1) {
    // shooter: mouse follow (like intro), shooting on click
    sheep.targetX = mouse.x + state.scrollX;
    sheep.targetY = mouse.y;
    const k = 0.1, damp = 0.8;
    sheep.vx += (sheep.targetX - sheep.x) * k;
    sheep.vy += (sheep.targetY - sheep.y) * k;
    sheep.vx *= damp; sheep.vy *= damp;
    sheep.x += sheep.vx; sheep.y += sheep.vy;
    if (Math.hypot(sheep.vx, sheep.vy) > 0.4) {
      particles.emit(sheep.x + (Math.random()-0.5)*16, sheep.y + 28, {
        vx: -sheep.vx*0.3, vy: 1, size: 2, life: 16, color: '#5533ff'
      });
    }
    // spawn monsters as sheep advances
    if (sheep.x > lastMonsterX + 240 && sheep.x < data.length - 200) {
      lastMonsterX = sheep.x;
      const my = Math.random() * (H * 0.7) + H * 0.15;
      monsters.push(new Monster(sheep.x + W * 0.7, my));
    }
    // bullets
    for (const b of bullets) b.step();
    bullets = bullets.filter(b => b.life > 0);
    // monster step + collision
    for (const m of monsters) {
      m.step(dt);
      for (const b of bullets) {
        if (Math.hypot(m.x - b.x, m.y - b.y) < 28) {
          m.dead = true; b.life = 0;
          for (let i = 0; i < 14; i++) {
            particles.emit(m.x, m.y, {
              vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
              size: 2 + Math.random()*2, life: 28,
              color: Math.random() > 0.5 ? '#ff2b9d' : '#ffb648',
            });
          }
        }
      }
    }
    monsters = monsters.filter(m => !m.dead && m.x > state.scrollX - 100);
    // shoot on click
    if (mouse.clicked) {
      bullets.push(new Bullet(sheep.x + 20, sheep.y, 14, 0));
      // muzzle particles
      for (let i = 0; i < 6; i++) {
        particles.emit(sheep.x + 22, sheep.y, {
          vx: 4 + Math.random()*3, vy: (Math.random()-0.5)*2,
          size: 2, life: 10, color: '#00ff88',
        });
      }
    }
  } else {
    // jumper: auto-scroll, sheep on ground, space to jump
    const groundY = H - 100;
    sheepPhysics.baseY = groundY;
    // sheep auto moves right at constant speed (use mouse y for fine-tuning? keep horizontal locked)
    sheep.vx = 3.6;
    sheep.x += sheep.vx;
    // jump physics
    sheepPhysics.vy += 0.8; // gravity
    sheep.y += sheepPhysics.vy;
    if (sheep.y >= groundY) {
      sheep.y = groundY;
      sheepPhysics.vy = 0;
      sheepPhysics.jumping = false;
    }
    // engine
    particles.emit(sheep.x - 10, sheep.y + 26, {
      vx: -2 + Math.random(), vy: Math.random()*0.5,
      size: 2, life: 14, color: '#00f5ff',
    });
    // spawn obstacles
    if (sheep.x > lastObstacleX + 280 + Math.random() * 120 && sheep.x < data.length - 300) {
      lastObstacleX = sheep.x;
      obstacles.push(new Obstacle(sheep.x + W * 0.8, groundY - 20));
    }
    for (const o of obstacles) o.step(dt);
    obstacles = obstacles.filter(o => o.x > state.scrollX - 100);
    // collision: knock back
    for (const o of obstacles) {
      if (Math.hypot(o.x - sheep.x, o.y - sheep.y) < 38 && !o.hit) {
        o.hit = true;
        sheep.x -= 50;
        for (let i = 0; i < 12; i++) {
          particles.emit(sheep.x, sheep.y, {
            vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
            size: 2, life: 20, color: '#ff2b9d',
          });
        }
      }
    }
  }

  // step photos
  for (const m of data.mirrors) m.step(dt);
}

/* ════════════════════════════════════════════════════════════════════
   Title screen
   ════════════════════════════════════════════════════════════════════ */
function renderTitleScene(t) {
  // floating cosmic backdrop on canvas
  drawCosmicRings(t, '#00f5ff');
}

/* draw small mirror + sheep logo in title canvas */
function drawTitleLogo() {
  const lc = document.getElementById('logoCanvas');
  const c = lc.getContext('2d');
  c.imageSmoothingEnabled = false;
  function loop(t) {
    c.clearRect(0, 0, 64, 64);
    drawMirror(c, 32, 32, 1.6, t/300, { interior: 'reflect', accent: '#00f5ff', glow: 1, showEyes: true });
    if (document.getElementById('titleScreen').classList.contains('hide')) return;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}
drawTitleLogo();

/* ════════════════════════════════════════════════════════════════════
   Space bar handler — drives state transitions
   ════════════════════════════════════════════════════════════════════ */
function onSpace() {
  if (state.stage === STAGE.TITLE) return;
  // dialog speed-up
  if (dialogIsTyping()) {
    // finish text instantly using current speaker text
    fastForwardDialog(dialogTxt.textContent + '');
    return;
  }
  // INTRO sequence
  if (state.stage === STAGE.INTRO) {
    advanceIntro();
    return;
  }
  // L3 jump
  if (state.stage === STAGE.L3_GAME && !sheepPhysics.jumping && sheep.y >= sheepPhysics.baseY - 1) {
    sheepPhysics.vy = -16;
    sheepPhysics.jumping = true;
    for (let i = 0; i < 8; i++) {
      particles.emit(sheep.x, sheep.y + 24, {
        vx: (Math.random()-0.5)*3, vy: 2 + Math.random()*2,
        size: 3, life: 20, color: '#00f5ff',
      });
    }
  }
  // L2 shoot via space too
  if (state.stage === STAGE.L2_GAME) {
    bullets.push(new Bullet(sheep.x + 20, sheep.y, 14, 0));
  }
  // ENDING sequence
  if (state.stage === STAGE.ENDING) {
    advanceEnding();
  }
}

const introScript = [
  // step 0: prompt (auto when near)
  null,
  // step 1: sheep speaks
  { speaker: '小 羊', cls: '', text: '魔鏡啊魔鏡,誰是這世界上最棒的領頭羊?' },
  // step 2: mirror responds
  { speaker: '魔 鏡', cls: 'mirror', text: '當然是 . . . ▼ 跟我來,進入魔鏡的記憶宇宙吧 ▼' },
];
function advanceIntro() {
  if (state.introStep === 0) {
    if (!introMirror.isNear(sheep.x, sheep.y, 200)) {
      showHint('靠近魔鏡 並 按 SPACE');
      return;
    }
    state.introStep = 1;
    showDialog(introScript[1].speaker, introScript[1].text, introScript[1].cls);
  } else if (state.introStep === 1) {
    state.introStep = 2;
    showDialog(introScript[2].speaker, introScript[2].text, introScript[2].cls);
  } else if (state.introStep === 2) {
    hideDialog();
    // suction effect then transition
    suckIntoMirror(() => {
      flashTransition(() => gotoGate(0));
    });
  }
}

function suckIntoMirror(cb) {
  // rapid particle burst toward mirror
  let frames = 0;
  const interval = setInterval(() => {
    for (let i = 0; i < 12; i++) {
      particles.emit(sheep.x + (Math.random()-0.5)*40, sheep.y + (Math.random()-0.5)*40, {
        vx: (introMirror.x - sheep.x) * 0.04 + (Math.random()-0.5),
        vy: (introMirror.y - sheep.y) * 0.04 + (Math.random()-0.5),
        size: 3, life: 30,
        color: ['#00f5ff', '#5533ff', '#ffffff'][Math.floor(Math.random()*3)],
      });
    }
    sheep.x += (introMirror.x - sheep.x) * 0.08;
    sheep.y += (introMirror.y - sheep.y) * 0.08;
    frames++;
    if (frames > 22) { clearInterval(interval); cb(); }
  }, 40);
}

function completeLevel(idx) {
  // transition to gallery
  flashTransition(() => {
    showGallery(idx);
  });
}

const endingScript = [
  { speaker: '魔 鏡', cls: 'mirror', text: '現在,跟我一起回答…這世界上最棒的領頭羊是…' },
  // step 1 triggers final shout
];
function advanceEnding() {
  if (state.endingStep === 0) {
    state.endingStep = 1;
    showDialog(endingScript[0].speaker, endingScript[0].text, endingScript[0].cls);
  } else if (state.endingStep === 1) {
    state.endingStep = 2;
    showDialog('魔 鏡  &  小 羊', '是 資 管 系 !! 🎉', 'both');
    // final shout overlay after dialog
    setTimeout(() => {
      // confetti
      for (let i = 0; i < 200; i++) {
        particles.emit(W/2, H/2, {
          vx: (Math.random()-0.5)*16, vy: (Math.random()-0.5)*16,
          size: 3 + Math.random()*3, life: 60 + Math.random()*40,
          color: ['#00f5ff','#00ff88','#ff2b9d','#ffb648','#5533ff'][Math.floor(Math.random()*5)],
        });
      }
      hideDialog();
      document.getElementById('endingShout').classList.add('show');
    }, 2400);
  }
}

/* ════════════════════════════════════════════════════════════════════
   Click handlers (UI)
   ════════════════════════════════════════════════════════════════════ */
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('titleScreen').classList.add('hide');
  startIntro();
});

document.getElementById('passwordBtn').addEventListener('click', tryPassword);
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryPassword();
});
function tryPassword() {
  const idx = state.stage === STAGE.L1_GATE ? 0 : state.stage === STAGE.L2_GATE ? 1 : 2;
  const lv = LEVELS[idx];
  const v = document.getElementById('passwordInput').value.trim().toLowerCase();
  const accepted = lv.password.some(p => p.toLowerCase() === v);
  const errEl = document.getElementById('passwordErr');
  if (accepted) {
    errEl.textContent = '★ 解鎖成功!魔鏡發光中… ★';
    errEl.style.color = 'var(--pixel-green)';
    setTimeout(() => {
      closePassword();
      flashTransition(() => startLevel(idx));
    }, 700);
  } else {
    errEl.textContent = '✕ 咒語錯誤,再試一次…';
    errEl.style.color = 'var(--hot-pink)';
    errEl.classList.remove('shake'); void errEl.offsetWidth;
    errEl.classList.add('shake');
  }
}

document.getElementById('galleryNext').addEventListener('click', () => {
  hideGallery();
  const idx = state.stage === STAGE.L1_END ? 0 : state.stage === STAGE.L2_END ? 1 : 2;
  if (idx < 2) {
    flashTransition(() => gotoGate(idx + 1));
  } else {
    // go to ending
    flashTransition(() => startEnding());
  }
});

function startEnding() {
  state.stage = STAGE.ENDING;
  state.endingStep = 0;
  introMirror = new MirrorObject(W/2, H/2 + 20, { scale: 8, accent: '#00ff88' });
  sheep.x = W/2 + 200; sheep.y = H/2 + 100;
  sheep.vx = sheep.vy = 0;
  updateHUD();
  setTimeout(() => {
    showDialog('SYSTEM', '靠近魔鏡並按 SPACE,完成最後一句魔法咒語…', '');
    setTimeout(hideDialog, 3500);
  }, 700);
}

document.getElementById('replayBtn').addEventListener('click', () => {
  document.getElementById('endingShout').classList.remove('show');
  document.getElementById('titleScreen').classList.remove('hide');
  state.stage = STAGE.TITLE;
  state.introStep = 0; state.endingStep = 0; state.collected = 0;
  drawTitleLogo();
  updateHUD();
});

/* hide cursor over canvas (we have crosshair already) */
cvs.addEventListener('mouseenter', () => { document.body.style.cursor = 'crosshair'; });

/* ════════════════════════════════════════════════════════════════════
   Boot
   ════════════════════════════════════════════════════════════════════ */
updateHUD();
requestAnimationFrame(tick);

</script>
